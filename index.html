<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍭 SweetyBites</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #fff8f5;
            color: #2d2d2d;
            scroll-behavior: smooth;
        }
        a {
            text-decoration: none;
        }

        /* ===== NAVBAR ===== */
        nav {
            background: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #ff6a72;
            font-family: 'Pacifico', cursive;
        }
        .logo span {
            color: #2d2d2d;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            align-items: center;
        }
        nav ul li a {
            color: #2d2d2d;
            font-weight: 600;
            transition: 0.3s;
            font-size: 1rem;
        }
        nav ul li a:hover {
            color: #ff6a72;
        }
        .cart-icon {
            background: #ff6a72;
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }
        .cart-icon:hover {
            background: #e0555e;
            transform: scale(1.05);
        }
        .cart-count {
            background: #fff;
            color: #ff6a72;
            border-radius: 50%;
            padding: 0 8px;
            font-weight: 800;
        }

        /* ===== HERO ===== */
        .hero {
            background: url('gambar/bg.png');
            background-size: cover;
            background-position: center;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            padding: 0 20px;
            position: relative;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            font-family: 'Pacifico', cursive;
        }
        .hero p {
            font-size: 1.6rem;
            margin-top: 15px;
            opacity: 0.95;
            font-weight: 300;
            font-family: 'Dancing Script', cursive;
        }
        .hero .btn-order {
            display: inline-block;
            margin-top: 30px;
            background: #ff6a72;
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .hero .btn-order:hover {
            background: #e0555e;
            transform: translateY(-3px);
        }

        /* ===== SECTION ===== */
        .section {
            padding: 60px 5%;
            max-width: 1300px;
            margin: auto;
        }
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
            font-family: 'Fredoka One', cursive;
        }
        .section-title::after {
            content: '';
            width: 60px;
            height: 5px;
            background: #ff6a72;
            display: block;
            margin-top: 8px;
            border-radius: 10px;
        }
        .sub-title {
            color: #777;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-body {
            padding: 20px;
        }
        .card-body h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .card-body .price {
            color: #ff6a72;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 8px 0;
        }
        .card-body .desc {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .btn-add {
            background: #ff6a72;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-size: 1rem;
        }
        .btn-add:hover {
            background: #d30000;
        }

        /* ===== PAGE ===== */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ===== KERANJANG ===== */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 420px;
            height: 100vh;
            background: #fff;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.2);
            padding: 30px 25px;
            transition: 0.4s;
            z-index: 1000;
            overflow-y: auto;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-sidebar h2 {
            font-size: 1.8rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-sidebar .close-cart {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #888;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item .item-info h4 {
            font-size: 1rem;
        }
        .cart-item .item-info p {
            color: #ff6a72;
            font-weight: 700;
        }
        .cart-item .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-item .qty-control button {
            background: #f0f0f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cart-item .qty-control button:hover {
            background: #ddd;
        }
        .cart-total {
            margin-top: 30px;
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
        }
        .btn-checkout {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-checkout:hover {
            background: #219a52;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }
        .overlay.show {
            display: block;
        }

        /* ===== CHECKOUT FORM ===== */
        .checkout-form {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        .checkout-form h2 {
            margin-bottom: 25px;
        }
        .checkout-form input,
        .checkout-form textarea {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .checkout-form input:focus,
        .checkout-form textarea:focus {
            border-color: #ff6a72;
            outline: none;
        }
        .checkout-form .btn-submit {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .checkout-form .btn-submit:hover {
            background: #1da85c;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero p {
                font-size: 1.2rem;
            }
            nav ul {
                gap: 15px;
            }
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            .checkout-form {
                padding: 20px;
                margin: 20px;
            }
        }
        @media (max-width: 480px) {
            .logo {
                font-size: 1.3rem;
            }
            nav ul li a {
                font-size: 0.8rem;
            }
            .cart-icon {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav>
        <div class="logo">Sweety<span>Bites</span></div>
        <ul>
            <li><a href="#" onclick="showPage('home')">Beranda</a></li>
            <li><a href="#" onclick="showPage('menu')">Menu</a></li>
            <li><a href="#" onclick="showPage('checkout')">Checkout</a></li>
            <li>
                <button class="cart-icon" onclick="toggleCart()">
                    🛒 <span class="cart-count" id="cartCount">0</span>
                </button>
            </li>
        </ul>
    </nav>

    <!-- ===== OVERLAY ===== -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- ===== SIDEBAR KERANJANG ===== -->
    <div class="cart-sidebar" id="cartSidebar">
        <h2>
            🛒 Keranjang
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </h2>
        <div id="cartItems"></div>
        <div class="cart-total">
            <span>Total</span>
            <span id="cartTotal">Rp 0</span>
        </div>
        <button class="btn-checkout" onclick="goToCheckout()">💳 Lanjut Checkout</button>
    </div>

    <!-- ===== PAGE: HOME ===== -->
    <div class="page active" id="page-home">

        <!-- HERO -->
        <div class="hero">
        </div>

        <!-- BEST SELLER -->
        <section class="section">
            <h2 class="section-title">⭐ Best Seller</h2>
            <p class="sub-title">Paling laris & favorit pelanggan</p>
            <div class="card-grid" id="bestSellerGrid"></div>
        </section>

        <!-- MENU LAINNYA (hanya 3 item) -->
        <section class="section">
            <h2 class="section-title">🍽️ Menu Lainnya</h2>
            <p class="sub-title">Cek menu manis kami yang lain</p>
            <div class="card-grid" id="otherMenuGrid"></div>
            <div style="text-align:center; margin-top:30px;">
                <button class="btn-add" style="width:auto; padding:14px 40px;" onclick="showPage('menu')">Lihat Semua Menu →</button>
            </div>
        </section>
    </div>

    <!-- ===== PAGE: MENU ===== -->
    <div class="page" id="page-menu">
        <section class="section">
            <h2 class="section-title">📋 Semua Menu</h2>
            <p class="sub-title">Pilih makanan favoritmu</p>
            <div class="card-grid" id="fullMenuGrid"></div>
        </section>
    </div>

    <!-- ===== PAGE: CHECKOUT ===== -->
    <div class="page" id="page-checkout">
        <section class="section">
            <div class="checkout-form">
                <h2>📦 Checkout</h2>
                <p style="color:#777; margin-bottom:20px;">Isi data diri & alamat pengiriman</p>
                <input type="text" id="nama" placeholder="Nama lengkap" required />
                <input type="text" id="alamat" placeholder="Alamat pengiriman" required />
                <input type="tel" id="telp" placeholder="No. HP" required />
                <textarea rows="3" id="catatan" placeholder="Catatan (opsional)"></textarea>
                <div style="background:#f8f4f0; padding:15px; border-radius:12px; margin-bottom:20px;">
                    <p><strong>Total Pesanan:</strong> <span id="checkoutTotal">Rp 0</span></p>
                </div>
                <button class="btn-submit" onclick="prosesCheckout()">
                    💬 Pesan via WhatsApp
                </button>
                <button style="margin-top:12px; background:#ff6a72; color:#fff; border:none; padding:12px; width:100%; border-radius:50px; font-weight:700; cursor:pointer;" onclick="showPage('home')">← Kembali ke Beranda</button>
            </div>
        </section>
    </div>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ===== DATA MENU =====
        const menuData = [{
            id: 1,
            name: 'Mochi Buah',
            price: 20000,
            desc: 'Mochi dengan isian wippy cream dan buah serta topping buah diatasnya',
            image: 'gambar/mochi.jpeg',
            bestSeller: true
        }, {
            id: 2,
            name: 'Fudgy Brownies',
            price: 30000,
            desc: 'Brownies cokelat dengan tekstur fudgy yang lembut, padat, dan kaya rasa.',
            image: 'gambar/fudgy.jpeg',
            bestSeller: true
        }, {
            id: 3,
            name: 'Bolu Ketan Lumer',
            price: 10000,
            desc: 'Bolu ketan yang lembut dengan saus keju creamy yang gurih dan lezat.',
            image: 'gambar/ketan lumer.jpeg',
            bestSeller: true
        }, {
            id: 4,
            name: 'Brownies Alpukat',
            price: 10000,
            desc: 'Brownies kukus lembut dengan perpaduan alpukat creamy, whipped cream, dan cokelat lumer yang bikin nagih.',
            image: 'gambar/brokat.jpeg',
            bestSeller: false
        }, {
            id: 5,
            name: 'Bento Cake 10cm',
            price: 25000,
            desc: 'Cake mini yang lembut dengan krim creamy, sempurna untuk hadiah dan momen spesial.',
            image: 'gambar/bento.jpeg',
            bestSeller: false
        }, {
            id: 6,
            name: 'Ketan Keju Karamel',
            price: 30000,
            desc: 'Perpaduan bolu ketan yang lembut dengan lapisan keju creamy dan karamel yang kaya rasa.',
            image: 'gambar/karamel.jpeg',
            bestSeller: false
        }, {
            id: 7,
            name: 'Brownies Kukus',
            price: 30000,
            desc: 'Brownies kukus lembut dengan taburan keju parut dan ceres yang manis dan lezat.',
            image: 'gambar/bronis.jpeg',
            bestSeller: false
        }, {
            id: 8,
            name: 'Bolu Pandan',
            price: 35000,
            desc: 'Bolu pandan lembut dengan topping keju parut dan cokelat parut yang kaya rasa.',
            image: 'gambar/pandan.jpeg',
            bestSeller: false
        }];

        // ===== STATE =====
        let cart = [];
        let currentPage = 'home';

        // ===== RENDER FUNCTIONS =====
        function renderCards(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(item => `
                        <div class="card">
                            <img src="${item.image}" alt="${item.name}" loading="lazy" />
                            <div class="card-body">
                                <h3>${item.name}</h3>
                                <div class="price">Rp ${item.price.toLocaleString()}</div>
                                <div class="desc">${item.desc}</div>
                                <button class="btn-add" onclick="addToCart(${item.id})">+ Tambah ke Keranjang</button>
                            </div>
                        </div>
                    `).join('');
        }

        function renderBestSeller() {
            const best = menuData.filter(m => m.bestSeller);
            renderCards(best, 'bestSellerGrid');
        }

        function renderOtherMenu() {
            const nonBest = menuData.filter(m => !m.bestSeller);
            const limited = nonBest.slice(0, 3);
            renderCards(limited, 'otherMenuGrid');
        }

        function renderFullMenu() {
            renderCards(menuData, 'fullMenuGrid');
        }

        // ===== CART =====
        function addToCart(id) {
            const item = menuData.find(m => m.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateCartUI();
            const btn = event.target;
            btn.textContent = '✅ Ditambahkan!';
            setTimeout(() => btn.textContent = '+ Tambah ke Keranjang', 1000);
        }

        function removeFromCart(id) {
            const existing = cart.find(c => c.id === id);
            if (existing) {
                if (existing.qty > 1) {
                    existing.qty--;
                } else {
                    cart = cart.filter(c => c.id !== id);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, c) => sum + c.qty, 0);
            document.getElementById('cartCount').textContent = count;

            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `<p style="color:#999; text-align:center; padding:30px 0;">Keranjang kosong 😢</p>`;
            } else {
                container.innerHTML = cart.map(c => `
                            <div class="cart-item">
                                <div class="item-info">
                                    <h4>${c.name}</h4>
                                    <p>Rp ${(c.price * c.qty).toLocaleString()}</p>
                                </div>
                                <div class="qty-control">
                                    <button onclick="removeFromCart(${c.id})">−</button>
                                    <span>${c.qty}</span>
                                    <button onclick="addToCart(${c.id})">+</button>
                                </div>
                            </div>
                        `).join('');
            }

            const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
            document.getElementById('cartTotal').textContent = `Rp ${total.toLocaleString()}`;
            document.getElementById('checkoutTotal').textContent = `Rp ${total.toLocaleString()}`;
        }

        // ===== TOGGLE CART =====
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        // ===== PAGE NAVIGATION =====
        function showPage(page) {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            currentPage = page;

            if (page === 'checkout') {
                const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
                document.getElementById('checkoutTotal').textContent = `Rp ${total.toLocaleString()}`;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToCheckout() {
            if (cart.length === 0) {
                alert('Keranjang masih kosong! Tambahkan menu dulu ya.');
                return;
            }
            showPage('checkout');
        }

        // ===== PROSES CHECKOUT → WA =====
        function prosesCheckout() {
            const nama = document.getElementById('nama').value.trim();
            const alamat = document.getElementById('alamat').value.trim();
            const telp = document.getElementById('telp').value.trim();

            if (!nama || !alamat || !telp) {
                alert('Harap isi semua data diri!');
                return;
            }

            if (cart.length === 0) {
                alert('Keranjang kosong!');
                return;
            }

            // ====== ⚠️ GANTI NOMOR WA DI SINI ======
            const waNumber = '6282161116246'; // ← Ganti dengan nomor WA kamu (pakai kode negara, tanpa +)

            // Format pesanan
            const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
            const detail = cart.map(c => `- ${c.name} x${c.qty} = Rp ${(c.price * c.qty).toLocaleString()}`).join('\n');
            const catatan = document.getElementById('catatan').value.trim();

            let message = `Halo SweetyBites! Saya mau pesan:\n\n${detail}\n\n`;
            message += `Total: Rp ${total.toLocaleString()}\n\n`;
            message += `📋 Data Pemesan:\n`;
            message += `Nama: ${nama}\n`;
            message += `Alamat: ${alamat}\n`;
            message += `No. HP: ${telp}\n`;
            if (catatan) {
                message += `Catatan: ${catatan}\n`;
            }
            message += `\nTerima kasih! 🙏`;

            const waLink = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;

            // Buka WhatsApp
            window.open(waLink, '_blank');

            // Reset keranjang
            cart = [];
            updateCartUI();
            showPage('home');
            document.getElementById('nama').value = '';
            document.getElementById('alamat').value = '';
            document.getElementById('telp').value = '';
            document.getElementById('catatan').value = '';
        }

        // ===== INIT =====
        renderBestSeller();
        renderOtherMenu();
        renderFullMenu();
        updateCartUI();
    </script>

</body>
</html>
